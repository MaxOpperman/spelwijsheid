name: Deploy to Self-Hosted Server

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.lowercase.outputs.owner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert repository owner to lowercase
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/spelwijsheid:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/spelwijsheid:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_PATH=

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull the latest image
        run: sudo docker pull ghcr.io/${{ needs.build.outputs.image-tag }}/spelwijsheid:latest

      - name: Stop and remove old container
        run: |
          sudo docker stop spelwijsheid || true
          sudo docker rm spelwijsheid || true

      - name: Run the new container
        run: |
          sudo docker run -d \
            --name spelwijsheid \
            --restart unless-stopped \
            -p 3000:6749 \
            ghcr.io/${{ needs.build.outputs.image-tag }}/spelwijsheid:latest

      - name: Clean up old images
        run: sudo docker image prune -af --filter "until=24h"
