name: Deploy to Self-Hosted Server

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.lowercase.outputs.owner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Convert repository owner to lowercase
        id: lowercase
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase.outputs.owner }}/spelwijsheid:latest
            ghcr.io/${{ steps.lowercase.outputs.owner }}/spelwijsheid:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_PATH=

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull the latest image
        run: sudo docker pull ghcr.io/${{ needs.build.outputs.image-tag }}/spelwijsheid:latest

      - name: Stop and remove old container
        run: |
          sudo docker stop spelwijsheid || true
          sudo docker rm spelwijsheid || true

      - name: Run the new container
        run: |
          sudo docker run -d \
            --name spelwijsheid \
            --restart unless-stopped \
            --add-host=host.docker.internal:host-gateway \
            -p ${{ secrets.HOST_PORT }}:3000 \
            -e DATABASE_URL="postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}" \
            -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            -e GEOIP_DB_PATH=/app/geoip/GeoLite2-City.mmdb \
            -e FINGERPRINT_SALT=${{ secrets.FINGERPRINT_SALT }} \
            -e MAXMIND_ACCOUNT_ID=${{ secrets.MAXMIND_ACCOUNT_ID }} \
            -e MAXMIND_LICENSE_KEY=${{ secrets.MAXMIND_LICENSE_KEY }} \
            -e OLLAMA_API_URL=${{ secrets.OLLAMA_API_URL }} \
            -e OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }} \
            ghcr.io/${{ needs.build.outputs.image-tag }}/spelwijsheid:latest

      - name: Clean up old images
        run: sudo docker image prune -af --filter "until=24h"
